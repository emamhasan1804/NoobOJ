{{define "content"}}
<style>
    .accepted {
        color: rgb(5, 146, 5);
    }

    .wa {
        color: rgb(218, 15, 15);
    }
</style>
<div style="margin-left: 8rem;margin-right: 8rem;margin-top: 2rem;">
    <table border="1" style="width: 100%; border-collapse: collapse;">
        <tr>
            <th style="padding-top: 7px; padding-bottom: 7px; width: 8rem;">#</th>
            <th style="padding-top: 7px; padding-bottom: 7px; width: 10rem;">Author</th>
            <th style="padding-top: 7px; padding-bottom: 7px;">Problem</th>
            <th style="padding-top: 7px; padding-bottom: 7px;">Language</th>
            <th style="padding-top: 7px; padding-bottom: 7px;">Submitted</th>
            <th style="padding-top: 7px; padding-bottom: 7px;">Verdict</th>
        </tr>
        <tr style="background-color: RGB(224, 237, 253)">
            <td style="text-align: center; padding-top: 15px; padding-bottom: 15px;"><a
                    href="/submission?id={{.ID}}">{{.ID}}</a></td>
            <td style="text-align: center; padding-top: 15px; padding-bottom: 15px;"><a
                    style="text-decoration: none; color: #111;"
                    href="/profile?username={{.Username}}"><strong>{{.Username}}</strong></a></td>
            </td>
            <td style="text-align: center; padding-top: 15px; padding-bottom: 15px;"><a
                    href="/problem?id={{.PID}}">{{.Ptitle}}</a></td>
            <td style="text-align: center; padding-top: 15px; padding-bottom: 15px;">GNU G++14</td>
            <td style="text-align: center; padding-top: 15px; padding-bottom: 15px;"><code>{{.Time}}</code></td>
            <td style="text-align: center; padding-top: 15px; padding-bottom: 15px;"
                class="{{if eq .Verdict .Accepted}}accepted{{else}}wa{{end}}"><b>{{.Verdict}}</b></td>
        </tr>
    </table>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <p style="margin-bottom: 0px;"><strong>Source code</strong></p>
        <button onclick="copyCode()">copy</button>
    </div>
    <div id="code"
        style="border: 1px solid rgb(74, 74, 74); background-color: #f1f1f1; max-height: 60vh; min-height: 5rem; overflow-y: auto; padding: 10px;">
        <pre style="margin: 0; white-space: pre-wrap;"><code>{{.Code}}</code></pre>
    </div>
</div>


<script>
    function copyCode() {
        const text = document.getElementById("code").innerText;
        navigator.clipboard.writeText(text).then
    }
</script>
{{end}}
