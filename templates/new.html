{{define "content"}}
<style>
    /* 1. Navigation Bar Styling */
    .tabs-nav {
        display: flex;
        background-color: #f4f6f8;
        /* Light grey background from screenshot */
        border: 1px solid #d1d5db;
        border-bottom: none;
        /* padding-left: 10px; */
    }

    .tab-btn {
        border-radius: 0px;
        background: none;
        border: none;
        padding: 12px 20px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #738f93;
        /* Muted grey for inactive */
        transition: all 0.2s ease;
        outline: none;
        position: relative;
        border-left: 1px solid transparent;
        border-right: 1px solid transparent;
    }

    /* 2. Active Tab Styling */
    .tab-btn.active {
        background-color: #ffffff;
        color: #2c3e50;
        /* Creates the "lifted" effect */
        border-left: 1px solid #d1d5db;
        border-right: 1px solid #d1d5db;
        margin-bottom: -1px;
        /* Overlaps the bottom border */
        z-index: 2;
    }

    /* The blue/dark indicator line */
    .tab-btn.active::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background-color: #34495e;
    }

    /* 3. Content Area Styling */
    .content-container {
        border: 1px solid #d1d5db;
        /* padding: 30px; */
        background: #fff;
        min-height: 200px;
        border-radius: 0 0 4px 4px;
    }

    .tab-content {
        display: none;
        /* Hide all by default */
    }

    .tab-content.active {
        display: block;
        /* Show only the active one */
        animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(5px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
<style>
    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border: 1px solid rgb(74, 74, 74);
    }

    h1 {
        margin-top: 0;
    }

    label {
        font-weight: 600;
    }

    input[type="text"],
    textarea,
    select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
    }

    textarea {
        resize: vertical;
    }

    fieldset {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 15px;
        margin-bottom: 15px;
        background: #fafafa;
    }

    legend {
        font-weight: bold;
        padding: 0 5px;
    }

    button {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    .add-btn {
        background: #2d8cff;
        color: white;
    }

    .remove-btn {
        background: #ff4d4f;
        color: white;
        margin-top: 8px;
    }

    .submit-btn {
        background: #28a745;
        color: white;
        font-weight: bold;
        padding: 10px 18px;
        font-size: 15px;
    }

    hr {
        border: none;
        border-top: 1px solid #eee;
        margin: 25px 0;
    }

    h1 {
        margin-top: 2rem;
        color: #111;
    }
</style>


<div
    style=" margin-left: 8rem;margin-right: 8rem;display: flex;flex-direction: column;align-items: center;justify-content: center;">

    <div class="tabs-nav" style="width: 100%;">
        <button style="margin-left: 1rem;" class="tab-btn active" onclick="openTab(event, 'details')">Details</button>
        <button class="tab-btn" onclick="openTab(event, 'test-case')">Test Cases</button>
        <button class="tab-btn" onclick="openTab(event, 'languages')">Languages</button>
        <button class="tab-btn" onclick="openTab(event, 'editorial')">Editorial</button>
    </div>
    <div class="content-container" style="width: 100%;">
        <form action="/admin/new" method="POST">
            <div id="details" class="tab-content active section">
                <h2>Problem Details</h2>
                <label for="title">Problem Title</label>
                <input type="text" name="title" id="title" placeholder="Enter problem title" required> <br><br>
                <label for="statement">Problem Statement</label>
                <textarea name="statement" id="statement" rows="6" placeholder="Describe the problem"
                    required></textarea> <br><br>
                <label for="input_desc">Input</label>
                <textarea name="input_desc" id="input_desc" rows="3" placeholder="Describe the input"
                    required></textarea> <br><br>
                <label for="output_desc">Output</label>
                <textarea name="output_desc" id="output_desc" rows="3" placeholder="Describe the output"
                    required></textarea> <br><br>
                <label for="constraints">Constraints</label>
                <textarea name="constraints" id="constraints" rows="3" placeholder="e.g. 1 ≤ N ≤ 10^5"></textarea>
                <br><br>
                <label for="tags">Tags</label>
                <input type="text" name="tags" id="tags" rows="3" placeholder="Bruteforce"></textarea> <br><br>
                <label for="rating">Rating</label>
                <input type="text" name="rating" id="rating" rows="3" placeholder="800"
                    style="width: 10%; margin-left: 5px;" inputmode="numeric" pattern="[0-9]{3,4}" maxlength="4"
                    minlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>

            <div id="test-case" class="tab-content">
                <div id="test-case-container">
                    <h2>Test Cases</h2>
                <fieldset>

                    <legend>Test Case 1</legend>

                    <label for="test_input[]">Input</label>
                    <textarea name="test_input[]" id="test_input[]" rows="3"></textarea>

                    <label for="test_output[]">Output</label>
                    <textarea name="test_output[]" id="test_output[]" rows="3"></textarea>

                    <label>Type</label>
                    <select name="test_type[]">
                        <option value="hidden">Hidden</option>
                        <option value="sample">Sample (Visible)</option>
                    </select>
                    <button type="button" class="remove-btn" onclick="removeTestCase(this)">Remove</button>
                    

                </fieldset>
                </div>
                <button type="button" class="add-btn" onclick="addTestCase()">+ Add Test Case</button>
            </div>

            <div id="languages" class="tab-content">
                <h2>Languages</h2>
                <p>Enable or disable specific programming languages for this task.</p>
            </div>

            <div id="editorial" class="tab-content">
                <h2>Editorial</h2>
                <p>Provide a detailed explanation and solution for the participants.</p>
            </div>
        </form>

    </div>
            
    <button type="submit" class="submit-btn">Save Problem</button>


    </div>
</div>


<script>

    function updateNumbers() {
        const fieldsets = document.querySelectorAll("#test-case-container fieldset")

        fieldsets.forEach((f, i) => {
            f.querySelector("legend").textContent = "Test Case " + (i + 1)
        })
    }

    function addTestCase() {

        const container = document.getElementById("test-case-container")

        const field = document.createElement("fieldset")

        field.innerHTML = `
<legend></legend>

<label>Input</label>
<textarea name="test_input[]" rows="3"></textarea>

<label>Output</label>
<textarea name="test_output[]" rows="3"></textarea>

<label>Type</label>
<select name="test_type[]">
<option value="hidden">Hidden</option>
<option value="sample">Sample (Visible)</option>
</select>

<button type="button" class="remove-btn" onclick="removeTestCase(this)">Remove</button>
`

        container.appendChild(field)

        updateNumbers()
    }

    function removeTestCase(btn) {
        btn.parentElement.remove()
        updateNumbers()
    }

    updateNumbers()

</script>
<script>
    function openTab(evt, tabName) {
        // Declare all variables
        var i, tabcontent, tablinks;

        // Get all elements with class="tab-content" and hide them
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
        }

        // Get all elements with class="tab-btn" and remove the class "active"
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }

        // Show the current tab, and add an "active" class to the button that opened the tab
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }
</script>

{{end}}
