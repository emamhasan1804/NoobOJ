<!DOCTYPE html>
<html>

<head>
    <title>{{if .Title}}{{.Title}}{{else}}NoobOJ{{end}}</title>
    <style>
        .nav {
            border: 1px solid rgb(74, 74, 74);
            display: flex;
            justify-content: space-between;
            margin-left: 8rem;
            margin-right: 8rem;
            padding-left: 2rem;
            padding-right: 2rem;
            align-items: center;
        }

        input[type="text"],
        textarea,
        input[type="datetime-local"],
        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .mid {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        table tr:nth-child(even) {
            background-color: #fffefe;
        }

        table tr:nth-child(odd) {
            background-color: #f1f1f1;
        }
    </style>
</head>

<body>
    <br>
    <div class="nav">
        <a style="text-decoration: none;color: rgb(0, 0, 0);letter-spacing: -1px;" href="/">
            <h2>NoobOJ</h2>
        </a>
        <div class="mid">
            <a style="margin-left: 1rem;margin-right: 1rem;text-decoration: none;color: rgb(74, 74, 74);" href="/">
                <h3>Home</h3>
            </a>
            <a style="margin-left: 1rem;margin-right: 1rem;text-decoration: none;color: rgb(74, 74, 74);"
                href="/contests">
                <h3>Contest</h3>
            </a>
            <a style="margin-left: 1rem;margin-right: 1rem;text-decoration: none;color: rgb(74, 74, 74);"
                href="/problemset">
                <h3>Problemset</h3>
            </a>
            <a style="margin-left: 1rem;margin-right: 1rem;text-decoration: none;color: rgb(74, 74, 74);"
                href="/leaderboard">
                <h3>Leaderboard</h3>
            </a>
            {{if .Admin}}
            <a style="margin-left: 1rem;margin-right: 1rem;text-decoration: none;color: rgb(228, 44, 44);"
                href="/administration">
                <h3>Administration</h3>
            </a>

            {{end}}
            <form action="/profile" method="GET">
                <input style="width: 100px;" type="text" name="username" placeholder="Find user" required>
            </form>


        </div>
        <div style="display: flex;">
            <a style="text-decoration: none;color: rgb(68, 44, 228);" href="/profile?username={{.Pusername}}">
                <h3>{{.Pusername}}</h3>
            </a>
            <a style="margin-left: 1rem;margin-right: 1rem;text-decoration: none;color: rgb(68, 44, 228);"
                href="/logout">
                <h3>{{if .Logout}}{{.Logout}}{{else}}Logout{{end}}</h3>
            </a>
        </div>
    </div>

    <br>
    {{template "content" .}}
    {{template "footer" .}}
</body>

</html>
