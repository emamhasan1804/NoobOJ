{{define "content"}}
<style>
    .table-style {
        margin-left: 8rem;
        margin-right: 8rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    table td,
    table th {
        padding: 10px;
        font-size: large;
        text-align: left;
    }

    table td:nth-child(1),
    table th:nth-child(1),
    table td:nth-child(3),
    table th:nth-child(3) {
        width: 5rem;
    }

    h1 {
        margin-top: 2rem;
        color: #111;
    }

    .yes {
        background-color: RGB(224, 237, 253) !important;
    }
    /* Initialize the counter on the table */
    table {
        counter-reset: rank-counter;
    }
    /* Increment the counter for every row (except the header) */
    table tr {
        counter-increment: rank-counter;
    }
    /* Skip the header row so it doesn't count as #1 */
    table tr:first-child {
        counter-reset: rank-counter;
    }
    /* Display the number in the rank cell */
    td.rank::before {
        content: counter(rank-counter);
    }
</style>

<div class="table-style">
    <h1>Global Leaderboard</h1>
    <br>
    <table border="1" style="border-collapse: collapse; color: rgb(74, 74, 74); width: 100%;">
        <tr>
            <th>Rank</th>
            <th>Who</th>
            <th>Solved</th>
        </tr>
        {{range .Items}}
        <tr class="{{if eq .Username $.Pusername}}yes{{else}}no{{end}}">
            <td class="rank"></td>
            <td><a style="text-decoration: none; color: #111;" href="/profile?username={{.Username}}"><strong>{{.Username}}</strong></a></td>
            <td>{{.Count}} </td>
        </tr>
        {{else}}
        <tr>
            <td colspan="3" style="text-align: center;">No data found.</td>
        </tr>
        {{end}}
    </table>
</div>

{{end}}
